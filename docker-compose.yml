name: echosupport

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-echosupport}
      POSTGRES_USER: ${POSTGRES_USER:-echosupport}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.14.1
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: .
      target: runner
      args:
        VITE_APP_EDITION: ${APP_EDITION:-pro}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-echosupport}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-echosupport}
      DIRECT_URL: postgresql://${POSTGRES_USER:-echosupport}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-echosupport}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:?Set MASTER_ENCRYPTION_KEY in .env}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      APP_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      ADMIN_CORS_ORIGINS: ${ADMIN_CORS_ORIGINS:-http://localhost:8080}
      UPLOADS_DIR: /app/apps/backend/uploads
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_EMBEDDING_API_KEY: ${OPENROUTER_EMBEDDING_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      ECHOSUPPORT_DEMO_MARKETING_SEED: ${ECHOSUPPORT_DEMO_MARKETING_SEED:-false}
      MAX_DOCUMENT_SIZE_MB: ${MAX_DOCUMENT_SIZE_MB:-50}
      CRON_SECRET: ${CRON_SECRET:?Set CRON_SECRET in .env}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?Set ADMIN_EMAIL in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
    volumes:
      - uploads_data:/app/apps/backend/uploads
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-8080}:80'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  uploads_data:
