<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EchoSupport Widget — Demo</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        padding: 40px;
        background: #f9fafb;
        color: #111;
      }
      h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
      p { color: #555; margin-bottom: 1rem; }
      code { background: #e5e7eb; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
    </style>
  </head>
  <body>
    <h1>EchoSupport Widget Demo</h1>
    <p>
      Виджет должен появиться в правом нижнем углу.<br/>
      Убедитесь, что backend запущен на <code>http://localhost:3000</code>
      и укажите ниже реальный <code>agent-key</code> вашего агента.
    </p>
    <p>
      Чтобы получить ключ: <code>GET /api/v1/admin/agents</code> → поле <code>publicKey</code>.
    </p>

    <script>
      // Replace with your real agent key from the admin panel
      window.__ECHO_AGENT_KEY__ = 'pk_REPLACE_ME';
      window.__ECHO_API_BASE__ = 'http://localhost:3000';
    </script>
    <script type="module" src="./dist/widget.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const widget = document.createElement('echo-support-widget');
        widget.setAttribute('api-base', window.__ECHO_API_BASE__);
        widget.setAttribute('agent-key', window.__ECHO_AGENT_KEY__);
        document.body.appendChild(widget);
      });
    </script>
  </body>
</html>
