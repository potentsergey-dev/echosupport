name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: echosupport_test
          POSTGRES_USER: echosupport
          POSTGRES_PASSWORD: integration-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U echosupport -d echosupport_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://echosupport:integration-password@localhost:5432/echosupport_test
      DIRECT_URL: postgresql://echosupport:integration-password@localhost:5432/echosupport_test
      TEST_DATABASE_URL: postgresql://echosupport:integration-password@localhost:5432/echosupport_test
      JWT_SECRET: integration-jwt-secret-at-least-32-characters
      MASTER_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      ADMIN_CORS_ORIGINS: https://admin.example
      UPLOADS_DIR: /tmp/echosupport-test-uploads

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @echosupport/backend db:generate

      - name: Verify integration database safety
        run: pnpm --filter @echosupport/backend test:integration:check-db

      - name: Apply test database migrations
        run: pnpm --filter @echosupport/backend db:migrate:deploy

      - name: Check release consistency
        run: pnpm check:release

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Test authentication and tenant isolation with PostgreSQL
        run: pnpm --filter @echosupport/backend test:integration

      - name: Build
        run: pnpm build

  compose-smoke:
    name: Docker Compose smoke test
    needs: ci
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: smoke-postgres-password
      JWT_SECRET: smoke-jwt-secret-at-least-32-characters
      MASTER_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      CRON_SECRET: smoke-cron-secret-at-least-32-characters
      ADMIN_EMAIL: smoke@example.com
      ADMIN_PASSWORD: smoke-admin-password

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Build and start the stack
        run: docker compose up --build --detach --wait --wait-timeout 180

      - name: Run install readiness smoke
        run: node scripts/smoke-install-readiness.mjs

      - name: Show service logs
        if: failure()
        run: docker compose logs --no-color

      - name: Stop the stack
        if: always()
        run: docker compose down --volumes --remove-orphans
