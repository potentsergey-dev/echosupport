name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @echosupport/backend db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

  compose-smoke:
    name: Docker Compose smoke test
    needs: ci
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: smoke-postgres-password
      JWT_SECRET: smoke-jwt-secret-at-least-32-characters
      MASTER_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      CRON_SECRET: smoke-cron-secret-at-least-32-characters
      ADMIN_EMAIL: smoke@example.com
      ADMIN_PASSWORD: smoke-admin-password

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build and start the stack
        run: docker compose up --build --detach --wait --wait-timeout 180

      - name: Check the public health endpoint
        run: curl --fail --show-error --silent http://localhost:8080/api/v1/health

      - name: Show service logs
        if: failure()
        run: docker compose logs --no-color

      - name: Stop the stack
        if: always()
        run: docker compose down --volumes --remove-orphans
