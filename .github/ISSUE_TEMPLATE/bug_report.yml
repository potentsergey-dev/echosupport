name: Bug report
description: Report reproducible incorrect behavior
title: '[Bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities here. Follow SECURITY.md.
  - type: input
    id: version
    attributes:
      label: EchoSupport version
      placeholder: v1.0.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options: [Docker Compose, Local development, Other]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove secrets and personal data.
      render: shell
